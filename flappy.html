<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird — Alberto LB</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080c14; --surface:#0d1422; --border:rgba(99,179,237,0.15); --accent:#63b3ed; --muted:#6b7fa3; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:#e8edf5; font-family:'Share Tech Mono',monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(99,179,237,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.025) 1px,transparent 1px); background-size:50px 50px; pointer-events:none; }
  .back-btn { position:fixed; top:20px; left:20px; background:var(--surface); border:1px solid var(--border); color:var(--muted); text-decoration:none; padding:8px 14px; border-radius:8px; font-size:0.78rem; transition:all 0.2s; z-index:10; }
  .back-btn:hover { color:var(--accent); border-color:var(--accent); }

  .game-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; position:relative; z-index:1; }

  .hud { display:flex; gap:28px; align-items:center; }
  .hud-item { text-align:center; }
  .hud-val { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--accent); display:block; text-shadow:0 0 12px rgba(99,179,237,0.5); }
  .hud-lbl { font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }

  canvas { border:1px solid var(--border); border-radius:12px; box-shadow:0 0 40px rgba(99,179,237,0.07); display:block; cursor:pointer; }

  .hint { font-size:0.72rem; color:var(--muted); letter-spacing:0.06em; }
  .hint kbd { background:var(--surface); border:1px solid var(--border); padding:2px 8px; border-radius:4px; color:var(--accent); }
  .diff-bar { width:360px; }
  .diff-label { display:flex; justify-content:space-between; font-size:0.68rem; color:var(--muted); margin-bottom:5px; }
  .diff-track { height:4px; background:rgba(255,255,255,0.06); border-radius:100px; overflow:hidden; }
  .diff-fill { height:100%; background:linear-gradient(90deg,var(--accent),#7f5af0); border-radius:100px; transition:width 0.5s ease; }
</style>
</head>
<body>

<a href="games.html" class="back-btn">← Jeux</a>

<div class="game-wrap">
  <div class="hud">
    <div class="hud-item"><span class="hud-val" id="scoreEl">0</span><span class="hud-lbl">Score</span></div>
    <div class="hud-item"><span class="hud-val" id="bestEl">0</span><span class="hud-lbl">Meilleur</span></div>
    <div class="hud-item"><span class="hud-val" id="lvlEl">1</span><span class="hud-lbl">Niveau</span></div>
  </div>

  <canvas id="canvas" width="360" height="520"></canvas>

  <div class="diff-bar">
    <div class="diff-label"><span>Difficulté</span><span id="diffTxt">Facile</span></div>
    <div class="diff-track"><div class="diff-fill" id="diffFill" style="width:10%"></div></div>
  </div>

  <div class="hint"><kbd>ESPACE</kbd> ou <kbd>Clic</kbd> / <kbd>Tap</kbd> pour sauter</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let bird, pipes, score, best, state, frame, particles2;
// state: 'idle' | 'playing' | 'dead'
best = parseInt(localStorage.getItem('flappy-best') || '0');
document.getElementById('bestEl').textContent = best;

const LEVELS = [
  {name:'Facile',   gap:165, speed:2.2,  spawnRate:110},
  {name:'Normal',   gap:145, speed:2.7,  spawnRate:100},
  {name:'Rapide',   gap:125, speed:3.2,  spawnRate:90},
  {name:'Expert',   gap:108, speed:3.8,  spawnRate:82},
  {name:'Extrême',  gap:92,  speed:4.5,  spawnRate:74},
  {name:'Insane',   gap:80,  speed:5.2,  spawnRate:68},
];
function getLevel(sc) { return LEVELS[Math.min(Math.floor(sc/5), LEVELS.length-1)]; }

// Stars BG
const stars = Array.from({length:60}, () => ({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.3, speed:Math.random()*0.3+0.1 }));

function init() {
  bird = { x:80, y:H/2, vy:0, r:14, rot:0, flap:0 };
  pipes = [];
  score = 0; frame = 0; particles2 = [];
  state = 'idle';
  render();
}

function flap() {
  if (state==='dead') { init(); return; }
  if (state==='idle') state = 'playing';
  bird.vy = -7.5;
  bird.flap = 1;
  // flap particles
  for (let i=0;i<6;i++) particles2.push({x:bird.x-bird.r,y:bird.y,vx:-1-Math.random()*2,vy:(Math.random()-0.5)*3,life:1,color:'#63b3ed'});
}

function tick() {
  if (state !== 'playing') { render(); requestAnimationFrame(tick); return; }
  frame++;
  const lv = getLevel(score);

  // Bird physics
  bird.vy += 0.42;
  bird.y += bird.vy;
  bird.rot = Math.max(-30, Math.min(90, bird.vy * 5));
  bird.flap = Math.max(0, bird.flap - 0.1);

  // Pipes
  if (frame % lv.spawnRate === 0) {
    const topH = 60 + Math.random() * (H - lv.gap - 120);
    pipes.push({ x:W+20, topH, gap:lv.gap, scored:false });
  }
  pipes.forEach(p => p.x -= lv.speed);
  pipes = pipes.filter(p => p.x > -80);

  // Score
  pipes.forEach(p => {
    if (!p.scored && p.x + 40 < bird.x - bird.r) {
      p.scored = true; score++;
      if (score > best) { best = score; localStorage.setItem('flappy-best', best); }
      // score particles
      for (let i=0;i<8;i++) particles2.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*2,life:1,color:Math.random()>0.5?'#63b3ed':'#2cb67d'});
    }
  });

  // Collision
  if (bird.y - bird.r < 0 || bird.y + bird.r > H) { die(); return; }
  for (const p of pipes) {
    if (bird.x + bird.r - 6 > p.x && bird.x - bird.r + 6 < p.x + 52) {
      if (bird.y - bird.r < p.topH || bird.y + bird.r > p.topH + p.gap) { die(); return; }
    }
  }

  // Stars move
  stars.forEach(s => { s.x -= lv.speed * 0.15; if (s.x < 0) s.x = W; });

  // Particles
  particles2 = particles2.filter(p => p.life > 0);
  particles2.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; });

  // HUD
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('bestEl').textContent = best;
  const lvIdx = Math.min(Math.floor(score/5), LEVELS.length-1);
  document.getElementById('lvlEl').textContent = lvIdx+1;
  document.getElementById('diffTxt').textContent = lv.name;
  document.getElementById('diffFill').style.width = Math.min(100, (lvIdx/(LEVELS.length-1))*100 + 10) + '%';

  render();
  requestAnimationFrame(tick);
}

function die() {
  state = 'dead';
  for (let i=0;i<20;i++) particles2.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*8,vy:-3-Math.random()*5,life:1,color:['#63b3ed','#7f5af0','#2cb67d','#f6ad55'][Math.floor(Math.random()*4)]});
  render();
}

function render() {
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050810'); sky.addColorStop(1,'#0a1220');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.5 + Math.sin(frame*0.02+s.x)*0.3;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Pipes
  pipes.forEach(p => {
    // Top pipe
    drawPipe(p.x, 0, 52, p.topH, true);
    // Bottom pipe
    drawPipe(p.x, p.topH+p.gap, 52, H-(p.topH+p.gap), false);
  });

  // Ground line
  ctx.strokeStyle='rgba(99,179,237,0.15)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-1); ctx.lineTo(W,H-1); ctx.stroke();

  // Particles
  particles2.forEach(p => {
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot * Math.PI/180);

  // Body glow
  ctx.shadowColor='#63b3ed'; ctx.shadowBlur=16;

  // Body
  ctx.fillStyle='#e8edf5'; ctx.beginPath(); ctx.ellipse(0,0,bird.r,bird.r*0.85,0,0,Math.PI*2); ctx.fill();

  // Wing
  const wingY = bird.flap > 0 ? -4 : 2;
  ctx.fillStyle='#63b3ed';
  ctx.beginPath(); ctx.ellipse(-4,wingY,9,5,-0.3,0,Math.PI*2); ctx.fill();

  // Eye
  ctx.shadowBlur=0;
  ctx.fillStyle='#080c14'; ctx.beginPath(); ctx.arc(7,-4,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(8,-5,1.2,0,Math.PI*2); ctx.fill();

  // Beak
  ctx.fillStyle='#f6ad55';
  ctx.beginPath(); ctx.moveTo(14,-2); ctx.lineTo(20,-4); ctx.lineTo(20,1); ctx.lineTo(14,2); ctx.closePath(); ctx.fill();

  ctx.restore();
  ctx.shadowBlur=0;

  // Score (while playing)
  if (state==='playing') {
    ctx.font='800 2rem Syne, sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillText(score, W/2+1, 54);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fillText(score, W/2, 52);
  }

  // Overlays
  if (state==='idle') drawOverlay('🐦 FLAPPY CYBER', 'Appuie pour commencer', null, true);
  if (state==='dead') drawOverlay('💥 CRASH', 'Score final', score, false);
}

function drawPipe(x, y, w, h, isTop) {
  // Pipe body
  const g = ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#0f2a1e'); g.addColorStop(0.3,'#1a4a30'); g.addColorStop(0.7,'#1a4a30'); g.addColorStop(1,'#0a1f14');
  ctx.fillStyle=g;
  const capH=18, capW=8;
  // Main body
  ctx.fillRect(x+capW/2,y+(isTop?capH:0),w-capW,h-(isTop?capH:capH));
  // Cap
  ctx.fillStyle='#1f5a38';
  if (isTop) ctx.fillRect(x,y+h-capH,w,capH);
  else ctx.fillRect(x,y,w,capH);
  // Highlight
  ctx.fillStyle='rgba(44,182,125,0.25)';
  if (isTop) { ctx.fillRect(x+capW/2+2,y,3,h-capH); ctx.fillRect(x+1,y+h-capH+2,3,capH-4); }
  else { ctx.fillRect(x+capW/2+2,y+capH,3,h-capH); ctx.fillRect(x+1,y+2,3,capH-4); }
  // Border glow
  ctx.strokeStyle='rgba(44,182,125,0.3)'; ctx.lineWidth=1;
  ctx.strokeRect(x+capW/2, y+(isTop?capH:0), w-capW, h-(isTop?capH:capH));
}

function drawOverlay(title, sub, sc, isStart) {
  ctx.fillStyle='rgba(8,12,20,0.82)';
  roundRect(ctx, W/2-120, H/2-90, 240, isStart?140:160, 16);
  ctx.fill();
  ctx.strokeStyle='rgba(99,179,237,0.25)'; ctx.lineWidth=1;
  roundRect(ctx, W/2-120, H/2-90, 240, isStart?140:160, 16);
  ctx.stroke();

  ctx.textAlign='center';
  ctx.font='800 1.3rem Syne, sans-serif'; ctx.fillStyle='#63b3ed';
  ctx.fillText(title, W/2, H/2-52);

  if (!isStart) {
    ctx.font='800 2.8rem Syne, sans-serif'; ctx.fillStyle='#fff';
    ctx.fillText(sc, W/2, H/2+8);
    ctx.font='0.78rem Share Tech Mono, monospace'; ctx.fillStyle='#6b7fa3';
    ctx.fillText('Meilleur : ' + best, W/2, H/2+32);
    ctx.font='800 0.78rem Syne, sans-serif'; ctx.fillStyle='rgba(99,179,237,0.7)';
    ctx.fillText('↵ CLICK / ESPACE pour rejouer', W/2, H/2+58);
  } else {
    ctx.font='0.75rem Share Tech Mono, monospace'; ctx.fillStyle='#6b7fa3';
    ctx.fillText(sub, W/2, H/2-20);
    ctx.font='800 0.8rem Syne, sans-serif'; ctx.fillStyle='rgba(99,179,237,0.7)';
    ctx.fillText('↵ CLICK / ESPACE', W/2, H/2+20);
    if (best>0) { ctx.font='0.72rem Share Tech Mono, monospace'; ctx.fillStyle='#6b7fa3'; ctx.fillText('Meilleur : '+best, W/2, H/2+42); }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// Controls
document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive:false});

init();
requestAnimationFrame(tick);
</script>
</body>
</html>
