<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Cyber — Alberto LB</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="icon" sizes="32x32" href="logo A.png">
<link rel="icon" sizes="16x16" href="logo A.png">
<link rel="apple-touch-icon" href="logo A.png">
<style>
  :root { --bg:#080c14; --surface:#0d1422; --border:rgba(44,182,125,0.2); --green:#2cb67d; --green2:#68d391; --accent:#63b3ed; --muted:#6b7fa3; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #e8edf5; font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(44,182,125,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(44,182,125,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }
  .back-btn {
    position: fixed; top: 20px; left: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); text-decoration: none;
    padding: 8px 14px; border-radius: 8px; font-size: 0.78rem;
    transition: all 0.2s; z-index: 10; font-family: 'Share Tech Mono', monospace;
  }
  .back-btn:hover { color: var(--green); border-color: var(--green); }

  .game-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; z-index: 1; }

  .hud {
    display: flex; gap: 32px; align-items: center;
    font-size: 0.82rem; color: var(--muted);
  }
  .hud-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--green); display: block; text-shadow: 0 0 12px rgba(44,182,125,0.5); }
  .hud-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; }

  canvas {
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(44,182,125,0.08), inset 0 0 60px rgba(0,0,0,0.4);
    display: block;
  }

  .controls {
    font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em;
    text-align: center; line-height: 1.8;
  }
  .controls kbd {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px; color: var(--green);
  }

  .overlay {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(8,12,20,0.95);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
    backdrop-filter: blur(12px);
    z-index: 5;
  }
  .overlay h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--green); margin-bottom: 8px; text-shadow: 0 0 20px rgba(44,182,125,0.5); }
  .overlay p { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }
  .overlay .final-score { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: #fff; margin: 12px 0; }
  .btn {
    background: var(--green); color: #080c14;
    border: none; padding: 10px 28px; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn:hover { filter: brightness(1.15); transform: scale(1.04); }
  .level-badge {
    display: inline-block; background: rgba(44,182,125,0.1);
    border: 1px solid rgba(44,182,125,0.3); color: var(--green);
    padding: 3px 12px; border-radius: 100px; font-size: 0.7rem;
    letter-spacing: 0.1em; margin-bottom: 16px;
  }
</style>
</head>
<body>

<a href="games.html" class="back-btn">← Jeux</a>

<div class="game-wrap">
  <div class="hud">
    <div>
      <span class="hud-val" id="score">0</span>
      <span class="hud-label">Score</span>
    </div>
    <div>
      <span class="hud-val" id="best">0</span>
      <span class="hud-label">Meilleur</span>
    </div>
    <div>
      <span class="hud-val" id="level">1</span>
      <span class="hud-label">Niveau</span>
    </div>
    <div>
      <span class="hud-val" id="length">1</span>
      <span class="hud-label">Longueur</span>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="canvas" width="420" height="420"></canvas>
    <div class="overlay" id="overlay">
      <div class="level-badge">⚡ SNAKE CYBER</div>
      <h2>PRÊT ?</h2>
      <p>Mange les pixels, évite les murs.<br>La vitesse augmente à chaque niveau.</p>
      <button class="btn" onclick="startGame()">DÉMARRER</button>
    </div>
  </div>

  <div class="controls">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> ou <kbd>WASD</kbd> pour bouger &nbsp;·&nbsp; <kbd>ESPACE</kbd> pause
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const COLS = 21, ROWS = 21;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, score, best, running, paused, loop, particles, level;

best = parseInt(localStorage.getItem('snake-best') || '0');
document.getElementById('best').textContent = best;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; level = 1; running = true; paused = false;
  particles = [];
  spawnFood();
  updateHUD();
  clearInterval(loop);
  loop = setInterval(tick, getSpeed());
}

function getSpeed() { return Math.max(60, 180 - (level-1)*15); }

function spawnFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
    spawnFood();
    const newLevel = Math.floor(score / 5) + 1;
    if (newLevel > level) { level = newLevel; clearInterval(loop); loop = setInterval(tick, getSpeed()); }
  } else {
    snake.pop();
  }

  if (score > best) { best = score; localStorage.setItem('snake-best', best); }
  updateHUD();
  draw();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
  document.getElementById('length').textContent = snake.length;
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    const speed = 1.5 + Math.random() * 2;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color: Math.random() > 0.5 ? '#2cb67d' : '#63b3ed' });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BG
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(44,182,125,0.05)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // Food
  const fx = food.x * CELL, fy = food.y * CELL;
  ctx.shadowColor = '#63b3ed'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#63b3ed';
  ctx.fillRect(fx+3, fy+3, CELL-6, CELL-6);
  ctx.fillStyle = '#90cdf4';
  ctx.fillRect(fx+6, fy+6, 4, 4);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const g = ctx.createLinearGradient(seg.x*CELL, seg.y*CELL, seg.x*CELL+CELL, seg.y*CELL+CELL);
    g.addColorStop(0, i===0 ? '#68d391' : `rgba(44,182,125,${1-t*0.5})`);
    g.addColorStop(1, i===0 ? '#2cb67d' : `rgba(44,182,125,${0.5-t*0.3})`);
    ctx.shadowColor = '#2cb67d'; ctx.shadowBlur = i===0 ? 14 : 6;
    ctx.fillStyle = g;
    const pad = i===0 ? 1 : 2;
    ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);

    if (i===0) {
      ctx.fillStyle = '#080c14';
      const ex = dir.x > 0 ? seg.x*CELL+CELL-7 : dir.x < 0 ? seg.x*CELL+3 : seg.x*CELL+CELL/2-5;
      const ey = dir.y > 0 ? seg.y*CELL+CELL-7 : dir.y < 0 ? seg.y*CELL+3 : seg.y*CELL+CELL/2-5;
      ctx.fillRect(ex, ey, 4, 4);
      const ex2 = dir.x > 0 ? seg.x*CELL+CELL-7 : dir.x < 0 ? seg.x*CELL+3 : seg.x*CELL+CELL/2+1;
      const ey2 = dir.y > 0 ? seg.y*CELL+CELL-7 : dir.y < 0 ? seg.y*CELL+3 : seg.y*CELL+CELL/2+1;
      ctx.fillRect(ex2, ey2, 4, 4);
    }
  });
  ctx.shadowBlur = 0;

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.05; p.vx *= 0.9; p.vy *= 0.9;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function gameOver() {
  running = false; clearInterval(loop);
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="level-badge">💀 GAME OVER</div>
    <h2>DÉFAITE</h2>
    <div class="final-score">${score}</div>
    <p>Niveau atteint : ${level} &nbsp;·&nbsp; ${score > best-1 && score > 0 ? '🏆 Nouveau record !' : 'Meilleur : ' + best}</p>
    <button class="btn" onclick="startGame()">REJOUER</button>
    &nbsp;&nbsp;
    <a href="games.html" style="color:var(--muted);font-size:0.78rem;text-decoration:none;">← Jeux</a>
  `;
  overlay.style.display = '';
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0}
  };
  if (e.key === ' ') { e.preventDefault(); paused = !paused; return; }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  const nd = map[e.key];
  if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
});

// Touch controls
let ts = null;
canvas.addEventListener('touchstart', e => { ts = e.touches[0]; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  if (!ts) return;
  const dx = e.changedTouches[0].clientX - ts.clientX;
  const dy = e.changedTouches[0].clientY - ts.clientY;
  if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else nextDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (nextDir.x === -dir.x && nextDir.y === -dir.y) nextDir = dir;
  e.preventDefault();
}, {passive:false});
</script>
</body>
</html>
